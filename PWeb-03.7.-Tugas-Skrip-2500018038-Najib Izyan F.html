    <h2>Tag Superscript dan Subscript</h2>

    <p>
        Contoh rumus matematika:
        (x<sub>1</sub> + x<sub>2</sub>)<sup>2</sup> =
        x<sub>1</sub><sup>2</sup> +
        x<sub>2</sub><sup>2</sup> +
        2x<sub>1</sub>x<sub>2</sub>
    </p>

    <p>
        Contoh rumus kimia:
        2H<sub>2</sub> + O<sub>2</sub> =
        2H<sub>2</sub>O
    </p>

    <p>
        Luas persegi adalah s<sup>2</sup>
    </p>

    <p>
        Air memiliki rumus H<sub>2</sub>O dan karbon dioksida CO<sub>2</sub>
    </p>

    <p>
        Kecepatan cahaya ditulis 3 x 10<sup>8</sup> m/s
    </p>
